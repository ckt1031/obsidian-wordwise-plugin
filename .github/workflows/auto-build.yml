name: BuildCI

on:
    push:
        branches: ["**"]
    pull_request:
        branches: [main]

permissions:
    contents: read

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  fetch-tags: true

            - uses: pnpm/action-setup@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: latest
                  cache: "pnpm"

            - run: pnpm install

            - run: pnpm run lint

            - run: pnpm run test

            - run: pnpm run build
              env:
                  SETTINGS_OBFUSCATE_KEY: ${{ secrets.SETTINGS_OBFUSCATE_KEY }}

            - run: node scripts/auto-build-version.ts

            - uses: actions/upload-artifact@v4
              with:
                  name: plugin
                  path: |
                      dist/main.js
                      manifest.json
                      dist/styles.css
